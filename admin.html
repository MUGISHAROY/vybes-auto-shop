<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control | Vybes Auto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .stat-card { border-left: 4px solid #ff9900; }
        input, select, textarea { background: #111 !important; border: 1px solid #333 !important; color: white !important; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="login-overlay" class="fixed inset-0 z-50 bg-black flex items-center justify-center p-6">
        <div class="glass-panel p-8 rounded-3xl w-full max-w-md text-center">
            <h2 class="text-2xl font-black mb-6 italic">VYBES<span class="text-orange-500">ADMIN</span></h2>
            <input type="password" id="admin-pass" placeholder="Enter Access Key" class="w-full p-4 rounded-xl mb-4 text-center">
            <button onclick="checkAuth()" class="w-full bg-orange-500 text-black font-bold py-4 rounded-xl hover:bg-orange-600 transition">ACCESS SYSTEM</button>
            <p id="login-error" class="text-red-500 mt-4 text-sm hidden">Invalid Access Key</p>
        </div>
    </div>

    <div id="admin-content" class="max-w-6xl mx-auto hidden">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black tracking-tighter">COMMAND CENTER</h1>
                <p class="text-gray-500 text-sm">Welcome back, admin</p>
            </div>
            <button onclick="location.href='index.html'" class="text-xs bg-white/10 px-4 py-2 rounded-full hover:bg-white/20 transition">VIEW LIVE STORE</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass-panel p-6 rounded-2xl stat-card">
                <p class="text-gray-500 text-xs uppercase font-bold">Total Site Visits</p>
                <h3 id="stat-visits" class="text-4xl font-black mt-1">1,284</h3>
            </div>
            <div class="glass-panel p-6 rounded-2xl stat-card" style="border-left-color: #25D366;">
                <p class="text-gray-500 text-xs uppercase font-bold">WhatsApp Leads</p>
                <h3 id="stat-leads" class="text-4xl font-black mt-1">42</h3>
            </div>
            <div class="glass-panel p-6 rounded-2xl stat-card" style="border-left-color: #3b82f6;">
                <p class="text-gray-500 text-xs uppercase font-bold">Items Live</p>
                <h3 id="stat-items" class="text-4xl font-black mt-1">0</h3>
            </div>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 glass-panel p-8 rounded-3xl">
                <h4 class="text-xl font-bold mb-6 text-orange-500">Publish New Inventory</h4>
                <form id="publish-form" class="space-y-4">
                    <div class="grid md:grid-cols-2 gap-4">
                        <input type="text" id="p-name" placeholder="Part Name" class="p-4 rounded-xl w-full" required>
                        <select id="p-category" class="p-4 rounded-xl w-full">
                            <option>Engine Parts</option>
                            <option>Suspension</option>
                            <option>Body & Trim</option>
                            <option>Electronics</option>
                            <option>Tyres & Rims</option>
                        </select>
                    </div>
                    <div class="grid md:grid-cols-3 gap-4">
                        <input type="number" id="p-price" placeholder="Price (UGX)" class="p-4 rounded-xl w-full" required>
                        <input type="text" id="p-make" placeholder="Car Make" class="p-4 rounded-xl w-full">
                        <select id="p-condition" class="p-4 rounded-xl w-full">
                            <option>New</option>
                            <option>Foreign Used</option>
                            <option>Local Used</option>
                        </select>
                    </div>
                    <textarea id="p-desc" placeholder="Brief Description..." class="p-4 rounded-xl w-full h-32"></textarea>
                    
                    <div class="border-2 border-dashed border-white/10 rounded-2xl p-8 text-center hover:border-orange-500 transition cursor-pointer">
                        <input type="file" id="p-image" class="hidden" accept="image/*" required>
                        <label for="p-image" class="text-gray-500 text-sm">Click to upload high-res photo</label>
                    </div>

                    <button type="submit" id="submit-btn" class="w-full bg-white text-black font-black py-4 rounded-xl hover:bg-orange-600 transition uppercase tracking-widest">
                        Publish to Vybes Auto
                    </button>
                </form>
            </div>

            <div class="space-y-6">
                <div class="glass-panel p-6 rounded-3xl">
                    <h4 class="text-sm font-bold text-gray-400 mb-4 uppercase">Manage Inventory</h4>
                    <div id="admin-inventory-list" class="space-y-2 max-h-96 overflow-y-auto">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyArP7pHkrQOKJtUWFnuhv74ZMQUcUrmzVA",
            authDomain: "vybesautoshaop.firebaseapp.com",
            projectId: "vybesautoshaop",
            storageBucket: "vybesautoshaop.firebasestorage.app",
            messagingSenderId: "176055320817",
            appId: "1:176055320817:web:0fe9315a7ed339aba9a950"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        function checkAuth() {
            const pass = document.getElementById('admin-pass').value;
            if(pass === "Vybes2026") { 
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                loadInventory();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        // 2. Publish Logic
        document.getElementById('publish-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "PUBLISHING...";
            
            const file = document.getElementById('p-image').files[0];
            const storageRef = storage.ref('parts/' + Date.now() + "_" + file.name);
            
            try {
                await storageRef.put(file);
                const url = await storageRef.getDownloadURL();

                await db.collection('parts').add({
                    name: document.getElementById('p-name').value,
                    price: parseInt(document.getElementById('p-price').value).toLocaleString(),
                    category: document.getElementById('p-category').value,
                    make: document.getElementById('p-make').value,
                    condition: document.getElementById('p-condition').value,
                    description: document.getElementById('p-desc').value,
                    image_url: url,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert("Published successfully!");
                location.reload();
            } catch (err) {
                console.error(err);
                alert("Upload failed.");
                btn.innerText = "PUBLISH TO VYBES AUTO";
            }
        });

        // 3. Delete Logic
        function loadInventory() {
            db.collection('parts').orderBy('timestamp', 'desc').onSnapshot(snap => {
                const list = document.getElementById('admin-inventory-list');
                list.innerHTML = '';
                document.getElementById('stat-items').innerText = snap.size;
                snap.forEach(doc => {
                    const p = doc.data();
                    list.innerHTML += `
                        <div class="flex justify-between items-center p-3 border-b border-white/5">
                            <span class="text-xs truncate font-bold">${p.name}</span>
                            <button onclick="db.collection('parts').doc('${doc.id}').delete()" class="text-red-500 text-[10px] font-bold">REMOVE</button>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>
