<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | VYBZ Auto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #0f1111; color: white; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="max-w-6xl mx-auto mb-8 flex justify-between items-center">
        <button onclick="history.back()" class="text-xs bg-white/10 px-4 py-2 rounded-full hover:bg-white/20 transition">← BACK TO STORE</button>
        <h1 class="text-xl font-black italic tracking-tighter">VYBZ<span class="text-orange-500">AUTO</span></h1>
    </nav>

    <main class="max-w-6xl mx-auto grid lg:grid-cols-2 gap-8">
        <div class="glass-panel p-4 rounded-3xl h-[400px] md:h-[500px] flex items-center justify-center overflow-hidden">
            <img id="display-image" src="https://via.placeholder.com/500x500/111/fff?text=Product+Image" class="w-full h-full object-cover rounded-2xl">
        </div>

        <div class="space-y-6">
            <div class="glass-panel p-8 rounded-3xl">
                <h2 id="display-name" class="text-4xl font-black mb-2 uppercase italic tracking-tighter">PRODUCT NAME</h2>
                <p class="text-gray-500 text-sm uppercase mb-6 tracking-widest">Premium Spare Part</p>
                
                <div class="text-5xl font-black text-orange-500 mb-8">
                    UGX <span id="display-price">0</span>
                </div>
                
                <p class="text-gray-400 leading-relaxed mb-10">
                    High-quality genuine spare part. Tested for durability and performance. 
                    Available for immediate pickup or delivery within Kampala.
                </p>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button id="whatsapp-order" class="bg-[#25D366] text-black font-black py-4 rounded-xl hover:opacity-90 transition uppercase text-xs tracking-widest">
                        Order via WhatsApp
                    </button>
                    <button class="bg-white text-black font-black py-4 rounded-xl hover:bg-orange-500 hover:text-white transition uppercase text-xs tracking-widest">
                        Add to Cart
                    </button>
                </div>
            </div>

            <div class="glass-panel p-6 rounded-2xl flex items-center gap-5 border-l-4 border-orange-500">
                <div class="text-3xl">📦</div>
                <div>
                    <h4 class="text-sm font-bold uppercase">Genuine Guarantee</h4>
                    <p class="text-xs text-gray-500">Verified quality check on all foreign used parts.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 1. Get the data from the URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const productName = urlParams.get('name');
        const productPrice = urlParams.get('price');
        const productImage = urlParams.get('img'); // Added to fetch the image URL

        // 2. Update the page content if the data exists
        if (productName && productPrice) {
            document.getElementById('display-name').innerText = productName;
            document.getElementById('display-price').innerText = Number(productPrice).toLocaleString();
            
            // If an image link was sent, display it; otherwise, use the placeholder
            if (productImage) {
                document.getElementById('display-image').src = decodeURIComponent(productImage);
            }
            
            // 3. Set up the WhatsApp order link
            const whatsappNumber = "256789909802"; 
            const message = encodeURIComponent(`Hello Vybes Auto, I want to order: ${productName} (UGX ${productPrice})`);
            
            document.getElementById('whatsapp-order').onclick = function() {
                window.open(`https://wa.me/${whatsappNumber}?text=${message}`, '_blank');
            };
        } else {
            document.getElementById('display-name').innerText = "Product Not Found";
        }
    </script>
</body>
</html>
