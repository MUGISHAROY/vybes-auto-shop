<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Vybes Auto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { 
            background: #0f1111; 
            color: white; 
            font-family: 'Inter', sans-serif; 
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #map { height: 200px; border-radius: 12px; border: 1px solid #333; }
        .btn-glow:hover { box-shadow: 0 0 15px rgba(255, 153, 0, 0.4); }
    </style>
</head>
<body>

    <nav class="p-4 border-b border-white/10 flex justify-between items-center bg-[#0f1111]">
        <a href="index.html" class="text-orange-500 font-bold">← BACK TO STORE</a>
        <h1 class="text-xl font-black italic">VYBES<span class="text-orange-500">AUTO</span></h1>
        <div class="w-10"></div> </nav>

    <main class="max-w-6xl mx-auto p-6 mt-6">
        <div class="grid md:grid-cols-2 gap-12">
            
            <div class="space-y-4">
                <div class="glass-panel p-4 rounded-3xl overflow-hidden">
                    <img id="product-img" src="https://via.placeholder.com/600x500/111/fff?text=Loading+Part..." 
                         class="w-full h-auto rounded-2xl object-cover hover:scale-105 transition duration-500">
                </div>
                <div class="flex gap-2">
                    <div class="w-20 h-20 glass-panel rounded-lg border-orange-500 border"></div>
                    <div class="w-20 h-20 glass-panel rounded-lg opacity-50"></div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="animate__animated animate__fadeInRight">
                    <span class="text-orange-500 text-xs font-black tracking-widest uppercase">Genuine Spare Part</span>
                    <h2 id="product-name" class="text-4xl font-black mt-2 leading-tight">TOYOTA PREMIO FRONT SHOCK ABSORBERS</h2>
                    <p class="text-gray-400 text-sm mt-2">Compatible with: 2008-2016 Models (ZRT260)</p>
                </div>

                <div class="glass-panel p-6 rounded-2xl">
                    <div class="flex items-baseline gap-2">
                        <span class="text-3xl font-black text-orange-500">UGX <span id="product-price">240,000</span></span>
                        <span class="text-gray-500 line-through text-sm">UGX 280,000</span>
                    </div>
                    <p class="text-green-500 text-xs font-bold mt-1">● IN STOCK (Ready for Pickup)</p>
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <a id="whatsapp-btn" href="#" target="_blank" 
                       class="bg-[#25D366] text-white py-4 rounded-xl font-black text-center flex items-center justify-center gap-2 btn-glow transition">
                       ORDER VIA WHATSAPP
                    </a>
                    
                    <a href="tel:+256700000000" 
                       class="bg-white text-black py-4 rounded-xl font-black text-center flex items-center justify-center gap-2 hover:bg-gray-200 transition">
                       CALL DEALER NOW
                    </a>
                </div>

                <div class="glass-panel p-4 rounded-2xl">
                    <h4 class="text-sm font-bold mb-3 flex items-center gap-2">
                        📍 DELIVERY & PICKUP LOCATION
                    </h4>
                    <div id="map"></div>
                    <p class="text-[10px] text-gray-500 mt-2 italic text-center uppercase tracking-widest">
                        We deliver across Kampala, Entebbe & Wakiso
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize Map centered on Kampala
        var map = L.map('map', {zoomControl: false}).setView([0.3163, 32.5822], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© Vybes Auto'
        }).addTo(map);

        // Add a marker for the Garage
        L.marker([0.3163, 32.5822]).addTo(map)
            .bindPopup('Vybes Auto Garage')
            .openPopup();

        // LOGIC: To grab data from URL or Firestore
        // In your final version, use Firestore to populate the IDs
        const urlParams = new URLSearchParams(window.location.search);
        const partName = urlParams.get('name') || "Toyota Spare Part";
        
        document.getElementById('product-name').innerText = partName;
        document.getElementById('whatsapp-btn').href = `https://wa.me/256789909802?text=Hi Vybes Auto, I want to order the ${partName}`;
    </script>
</body>
</html>
