<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VYBZ Auto Shop | Your Trusted Car Specialists</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            background: #0f1111; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
        }

        /* Glassmorphism Effect */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .glass:hover {
            border-color: #ff9900;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* The Intro Blocking Fix */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        .hide-intro {
            opacity: 0;
            visibility: hidden;
            pointer-events: none; /* Crucial: allows clicks to pass through */
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="text-center animate__animated animate__zoomIn">
            <h1 class="text-6xl font-black italic text-orange-500 tracking-tighter">VYBZ<span class="text-white">AUTO</span></h1>
            <p class="text-gray-500 tracking-[0.3em] uppercase mt-2 text-xs">Igniting the Drive</p>
        </div>
    </div>

    <nav class="sticky top-0 z-50 bg-[#0f1111]/90 backdrop-blur-md border-b border-white/10 px-6 py-4 flex justify-between items-center">
        <div class="cursor-pointer" ondblclick="location.href='admin.html'">
            <h1 class="text-2xl font-black italic tracking-tighter">VYBZ<span class="text-orange-500">AUTO</span></h1>
        </div>

        <div class="flex items-center gap-6">
            <div class="relative cursor-pointer group" onclick="toggleCart()">
                <span class="text-2xl">🛒</span>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-orange-500 text-black text-[10px] font-bold px-1.5 rounded-full">0</span>
            </div>
            <button class="bg-white text-black text-xs font-bold px-5 py-2 rounded-full hover:bg-orange-500 transition">SIGN IN</button>
        </div>
    </nav>

    <section class="relative h-[50vh] flex items-center justify-center text-center px-6">
        <div class="absolute inset-0 opacity-20">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQk7KRaTjPW5_4hRC_jwkhdwevFvTr7jNkuXQ&s" class="w-full h-full object-cover">
        </div>
        <div class="relative z-10 animate__animated animate__fadeInUp">
            <h2 class="text-4xl md:text-6xl font-black mb-4">PREMIUM SPARE PARTS</h2>
            <div class="flex max-w-xl mx-auto bg-white/10 rounded-full p-1 border border-white/20">
                <input type="text" placeholder="Search for Toyota, Subaru, Mercedes..." class="bg-transparent flex-1 px-6 outline-none text-sm">
                <button class="bg-orange-500 text-black font-bold px-8 py-3 rounded-full text-xs">SEARCH</button>
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto p-6 py-12">
        <h3 class="text-xl font-bold mb-8 flex items-center gap-3">
            <span class="w-10 h-1 bg-orange-500 rounded-full"></span>
            LATEST INVENTORY
        </h3>

        <div id="inventory-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            </div>
    </main>

    <script>
        // FIREBASE INITIALIZATION
        const firebaseConfig = {
            apiKey: "AIzaSyArP7pHkrQOKJtUWFnuhv74ZMQUcUrmzVA",
            authDomain: "vybesautoshaop.firebaseapp.com",
            projectId: "vybesautoshaop",
            storageBucket: "vybesautoshaop.firebasestorage.app",
            messagingSenderId: "176055320817",
            appId: "1:176055320817:web:0fe9315a7ed339aba9a950"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // LOAD ITEMS FROM FIRESTORE
        db.collection('parts').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = ''; // Clear the grid
            
            snapshot.forEach(doc => {
                const item = doc.data();
                grid.innerHTML += `
                    <div class="glass p-4 rounded-2xl flex flex-col group">
                        <div class="relative overflow-hidden rounded-xl mb-4 h-40">
                            <img src="${item.image_url}" class="w-full h-full object-cover">
                        </div>
                        <h4 class="text-sm font-bold truncate uppercase">${item.name}</h4>
                        <p class="text-[10px] text-gray-500 uppercase mt-1">${item.category || 'Spare Part'} • ${item.condition || 'Available'}</p>
                        <p class="text-orange-500 font-black mt-3">UGX ${item.price}</p>
                        
                        <div class="mt-4 flex gap-2">
                            <button onclick="viewProduct('${doc.id}')" class="flex-1 bg-white/5 hover:bg-white/10 text-[10px] font-bold py-2 rounded-lg transition">DETAILS</button>
                            <button onclick="addToCart(this)" class="flex-1 bg-orange-500 text-black text-[10px] font-bold py-2 rounded-lg transition">ADD</button>
                        </div>
                    </div>`;
            });
        });

        // HANDLE INTRO OVERLAY
        window.addEventListener('load', () => {
            setTimeout(() => {
                const intro = document.getElementById('intro-overlay');
                intro.classList.add('hide-intro');
                setTimeout(() => intro.remove(), 1000);
            }, 2000);
        });

        // CART FUNCTIONALITY
        let cartItems = 0;
        function addToCart(btn) {
            cartItems++;
            document.getElementById('cart-count').innerText = cartItems;
            const originalText = btn.innerText;
            btn.innerText = "ADDED! ✓";
            btn.classList.replace('bg-orange-500', 'bg-green-500');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.replace('bg-green-500', 'bg-orange-500');
            }, 1000);
        }

        // REDIRECT TO PRODUCT PAGE
        function viewProduct(docId) {
            window.location.href = `product.html?id=${docId}`;
        }

        function toggleCart() {
            alert("Cart feature: " + cartItems + " items ready for checkout!");
        }
    </script>
</body>
</html>
